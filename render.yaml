services:
  - type: web
    name: crop-ai-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python download_real_data.py && python train.py
    startCommand: uvicorn app.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
